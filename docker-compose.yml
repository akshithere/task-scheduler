version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: task-scheduler-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskscheduler
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - task-scheduler-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-scheduler-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: taskscheduler
      DB_SSLMODE: disable
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - task-scheduler-network

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: task-scheduler-swagger
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON: /openapi.yaml
      BASE_URL: /
    volumes:
      - ./api/openapi.yaml:/openapi.yaml:ro
    networks:
      - task-scheduler-network

  prometheus:
    image: prom/prometheus:latest
    container_name: task-scheduler-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - app
    networks:
      - task-scheduler-network

  grafana:
    image: grafana/grafana:latest
    container_name: task-scheduler-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - task-scheduler-network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  task-scheduler-network:
    driver: bridge
