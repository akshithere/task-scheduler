global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'task-scheduler'

scrape_configs:
  - job_name: 'task-scheduler-app'
    static_configs:
      - targets: ['app:8080']
        labels:
          service: 'task-scheduler'
    metrics_path: '/metrics'
    scrape_interval: 10s
